<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Anestesi v5.8 - Multi-Room</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #c0392b;
            --accent: #2980b9;
            --bg: #f5f6fa;
            --warning: #f39c12;
            --samsung: #ff5a00;
            --purple: #8e44ad;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            margin-bottom: 15px;
            border-bottom: 2px solid #ddd;
            gap: 2px;
        }
        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            font-weight: bold;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            white-space: nowrap;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .patient-panel {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .patient-panel.active {
            display: block;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .full-width {
            grid-column: span 2;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        /* Style khusus untuk input tanggal agar terlihat interaktif */
        input.date-picker-trigger {
            background-color: #fff;
            cursor: pointer;
        }
        .clock-display {
            font-family: monospace;
            background: #2c3e50;
            color: #2ecc71;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .time-info {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
            display: block;
        }
        .stopwatch-controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-start { background-color: var(--success); }
        .btn-end { background-color: var(--warning); }
        .btn-reset { background-color: var(--danger); }
        .btn-reset-stock { background-color: var(--purple); margin-top: 10px; padding: 8px 12px; font-size: 13px; width: 100%; display: block;}
        .btn-action { background-color: var(--accent); margin-top: 5px;}
        .btn-wa { background-color: #25D366; margin-top: 5px;}
        .btn-samsung { background-color: var(--samsung); margin-top: 5px;}
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .result-box {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-left: 5px solid var(--accent);
            margin-bottom: 20px;
        }
        .result-box h4 { margin-top: 0; color: var(--primary); }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            color: white;
            margin-bottom: 10px;
        }
        .running { background-color: var(--success); }
        .stopped { background-color: var(--danger); }
        
        .patient-stock-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        .stock-remaining {
            font-size: 15px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 5px;
            margin-bottom: 8px;
        }
        .topup-group {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .topup-group input {
            flex: 2;
            padding: 6px;
            font-size: 13px;
        }
        .btn-topup-flex {
            flex: 1;
            background-color: var(--success);
            padding: 6px;
            font-size: 13px;
            border-radius: 4px;
            margin: 0;
        }
        
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 15px;
        }
        @media(min-width: 600px) {
            .action-group {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>

    <h2>Kalkulator Gas Anestesia by ekalevi</h2>

    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-1" onclick="switchPatient(1)">Siak 1</button>
        <button class="tab-btn" id="tab-btn-2" onclick="switchPatient(2)">Siak 2</button>
        <button class="tab-btn" id="tab-btn-3" onclick="switchPatient(3)">Siak 3</button>
        <button class="tab-btn" id="tab-btn-4" onclick="switchPatient(4)">Kampar 1</button>
        <button class="tab-btn" id="tab-btn-5" onclick="switchPatient(5)">Kampar 2</button>
        <button class="tab-btn" id="tab-btn-6" onclick="switchPatient(6)">Rokan</button>
    </div>

    <div id="patient-containers"></div>

<script>
    // Inisialisasi awal tanggal sistem (YYYY-MM-DD)
    const todayRaw = new Date().toISOString().split('T')[0];
    let currentActiveTab = 1;
    let patients = [];
    
    const roomNames = {
        1: "Siak 1",
        2: "Siak 2",
        3: "Siak 3",
        4: "Kampar 1",
        5: "Kampar 2",
        6: "Rokan"
    };

    // Mengonversi YYYY-MM-DD ke DD/MM/YYYY
    function rawToIndoDate(dateStr) {
        if (!dateStr) return "";
        if (dateStr.includes('/')) return dateStr; // Jaga-jaga jika sudah berformat Indo
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        return dateStr;
    }

    // Mengonversi DD/MM/YYYY kembali ke YYYY-MM-DD untuk kebutuhan sistem browser
    function indoToRawDate(dateStr) {
        if (!dateStr) return todayRaw;
        const parts = dateStr.split('/');
        if (parts.length === 3) {
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        return dateStr;
    }

    function loadSavedData() {
        const localData = localStorage.getItem('anestesi_patients_data');
        if (localData) {
            try {
                patients = JSON.parse(localData);
                
                if (patients.length < 6) {
                    for (let i = patients.length; i < 6; i++) {
                        patients.push({
                            id: i + 1, nama: '', tanggal: rawToIndoDate(todayRaw), o2: 0, carrierType: 'N2O', carrierFlow: 0, gasType: 'Sevoflurane', gasVol: 0,
                            stockSevo: 250, stockIso: 250, remainingSevo: 250, remainingIso: 250,
                            isRunning: false, lastTickTime: null, totalElapsedMs: 0, jamMulai: '-', jamSelesai: '-',
                            accO2_L: 0, accN2O_L: 0, accAir_L: 0, accGas_mL: 0, catatan: ''
                        });
                    }
                    saveDataToStorage();
                }

                // Normalisasi data lama ke format baru jika ada yang masih YYYY-MM-DD
                patients.forEach(p => {
                    if(p.tanggal && p.tanggal.includes('-')) {
                        p.tanggal = rawToIndoDate(p.tanggal);
                    }
                });

                const sekarang = Date.now();
                patients.forEach(p => {
                    if (p.isRunning && p.lastTickTime) {
                        const deltaMs = sekarang - p.lastTickTime;
                        if (deltaMs > 0) {
                            const deltaMenit = deltaMs / 60000;
                            p.totalElapsedMs += deltaMs;
                            p.accO2_L += p.o2 * deltaMenit;
                            if (p.carrierType === 'N2O') p.accN2O_L += p.carrierFlow * deltaMenit;
                            else p.accAir_L += p.carrierFlow * deltaMenit;
                            
                            const totalFlow = p.o2 + p.carrierFlow;
                            const pembagi = (p.gasType === 'Sevoflurane') ? 183 : 194;
                            const gasUsed = (p.gasVol * totalFlow * 10 * deltaMenit) / pembagi;
                            p.accGas_mL += gasUsed;
                            
                            if (p.gasType === 'Sevoflurane') p.remainingSevo -= gasUsed;
                            else p.remainingIso -= gasUsed;
                        }
                        p.lastTickTime = sekarang;
                    }
                });
                saveDataToStorage();
            } catch (e) {
                createNewData();
            }
        } else {
            createNewData();
        }
    }

    function createNewData() {
        patients = Array.from({ length: 6 }, (_, i) => ({
            id: i + 1, nama: '', tanggal: rawToIndoDate(todayRaw), o2: 0, carrierType: 'N2O', carrierFlow: 0, gasType: 'Sevoflurane', gasVol: 0,
            stockSevo: 250, stockIso: 250, remainingSevo: 250, remainingIso: 250,
            isRunning: false, lastTickTime: null, totalElapsedMs: 0, jamMulai: '-', jamSelesai: '-',
            accO2_L: 0, accN2O_L: 0, accAir_L: 0, accGas_mL: 0, catatan: ''
        }));
        saveDataToStorage();
    }

    function saveDataToStorage() {
        localStorage.setItem('anestesi_patients_data', JSON.stringify(patients));
    }

    function initApp() {
        loadSavedData();
        const container = document.getElementById('patient-containers');
        container.innerHTML = '';

        patients.forEach(p => {
            const namaKamar = roomNames[p.id] || `Kamar ${p.id}`;
            container.innerHTML += `
                <div id="panel-${p.id}" class="patient-panel ${p.id === currentActiveTab ? 'active' : ''}">
                    <div class="grid">
                        <div>
                            <label>Nama Pasien</label>
                            <input type="text" id="nama-${p.id}" value="${p.nama}" oninput="updateData(${p.id}, 'nama', this.value)" placeholder="Nama pasien">
                        </div>
                        <div>
                            <label>Tanggal Tindakan</label>
                            <input type="text" class="date-picker-trigger" id="tanggal-display-${p.id}" value="${p.tanggal}" 
                                   placeholder="DD/MM/YYYY" readonly
                                   onclick="triggerNativeDatePicker(${p.id})">
                            <input type="date" id="tanggal-hidden-${p.id}" value="${indoToRawDate(p.tanggal)}" 
                                   style="display:none; position:absolute;" 
                                   onchange="handleNativeDateChange(${p.id}, this.value)">
                        </div>
                        <div class="full-width">
                            <label>Jam Perangkat (Real-Time) - ${namaKamar}</label>
                            <div class="clock-display" id="global-clock-${p.id}">00:00:00</div>
                            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                                <span class="time-info">▶ Mulai: <strong id="lbl-mulai-${p.id}">${p.jamMulai}</strong></span>
                                <span class="time-info">⏹ Selesai: <strong id="lbl-selesai-${p.id}">${p.jamSelesai}</strong></span>
                            </div>
                        </div>
                    </div>

                    <hr style="border: 0.5px solid #ddd; margin: 15px 0;">

                    <div class="grid">
                        <div>
                            <label>Oksigen (O2) - L/M</label>
                            <input type="number" step="0.1" id="o2-${p.id}" value="${p.o2}" oninput="updateData(${p.id}, 'o2', this.value)">
                        </div>
                        <div>
                            <label>Gas Carrier</label>
                            <select id="carrierType-${p.id}" onchange="updateData(${p.id}, 'carrierType', this.value)">
                                <option value="N2O" ${p.carrierType==='N2O'?'selected':''}>N2O</option>
                                <option value="AIR" ${p.carrierType==='AIR'?'selected':''}>AIR</option>
                            </select>
                        </div>
                        <div>
                            <label>Flow Carrier - L/M</label>
                            <input type="number" step="0.1" id="carrierFlow-${p.id}" value="${p.carrierFlow}" oninput="updateData(${p.id}, 'carrierFlow', this.value)">
                        </div>
                        <div>
                            <label>Agen Volatil</label>
                            <select id="gasType-${p.id}" onchange="updateData(${p.id}, 'gasType', this.value)">
                                <option value="Sevoflurane" ${p.gasType==='Sevoflurane'?'selected':''}>Sevoflurane</option>
                                <option value="Isoflurane" ${p.gasType==='Isoflurane'?'selected':''}>Isoflurane</option>
                            </select>
                        </div>
                        <div class="full-width">
                            <label>Konsentrasi Gas (%)</label>
                            <input type="number" step="0.1" id="gasVol-${p.id}" value="${p.gasVol}" oninput="updateData(${p.id}, 'gasVol', this.value)">
                        </div>
                    </div>

                    <div class="stopwatch-controls">
                        <button class="btn-start" id="btn-start-${p.id}" onclick="startTimer(${p.id})" ${p.isRunning?'disabled':''}>START</button>
                        <button class="btn-end" id="btn-end-${p.id}" onclick="stopTimer(${p.id})" ${!p.isRunning?'disabled':''}>END / PAUSE</button>
                        <button class="btn-reset" id="btn-reset-${p.id}" onclick="resetTimer(${p.id})">RESET PASIEN</button>
                    </div>

                    <div class="result-box">
                        <span id="status-${p.id}" class="status-badge ${p.isRunning?'running':'stopped'}">${p.isRunning?'RUNNING':'OFF'}</span>
                        <strong>Durasi Operasi: <span id="timer-display-${p.id}">00:00:00</span></strong>
                        <h4 style="margin-top: 10px; margin-bottom: 5px;">Akumulasi Pemakaian Gas:</h4>
                        <table style="width:100%; font-size: 14px;">
                            <tr><td>Oksigen (O2)</td><td>: <span id="accO2-${p.id}">0.00</span> Jam (<span id="accO2L-${p.id}">0</span> L)</td></tr>
                            <tr><td>N2O</td><td>: <span id="accN2O-${p.id}">0.00</span> Liter</td></tr>
                            <tr><td>AIR</td><td>: <span id="accAir-${p.id}">0.00</span> Liter</td></tr>
                            <tr><td>Gas Anestesi (<span id="lblGas-${p.id}">${p.gasType==='Sevoflurane'?'Sevo':'Iso'}</span>)</td><td>: <strong><span id="accGas-${p.id}">0.00</span> mL cairan</strong></td></tr>
                        </table>
                    </div>

                    <label style="font-size: 15px; color: var(--primary); margin-bottom: 10px;">📦 Manajemen Stok Gas - ${namaKamar} (CC)</label>
                    <div class="grid" style="margin-bottom: 5px;">
                        <div class="patient-stock-box">
                            <label>Stok Awal Sevo</label>
                            <input type="number" id="input-stock-sevo-${p.id}" value="${p.stockSevo.toFixed(0)}" oninput="updatePatientStockBaseline(${p.id}, 'Sevoflurane', this.value)">
                            <div class="stock-remaining">Sisa: <span id="display-stock-sevo-${p.id}">${p.remainingSevo.toFixed(1)}</span> CC</div>
                            <div class="topup-group">
                                <input type="number" id="flex-add-sevo-${p.id}" placeholder="+ CC">
                                <button class="btn-topup-flex" onclick="topUpPatientStockFlexible(${p.id}, 'Sevoflurane')">+</button>
                            </div>
                        </div>
                        <div class="patient-stock-box">
                            <label>Stok Awal Iso</label>
                            <input type="number" id="input-stock-iso-${p.id}" value="${p.stockIso.toFixed(0)}" oninput="updatePatientStockBaseline(${p.id}, 'Isoflurane', this.value)">
                            <div class="stock-remaining">Sisa: <span id="display-stock-iso-${p.id}">${p.remainingIso.toFixed(1)}</span> CC</div>
                            <div class="topup-group">
                                <input type="number" id="flex-add-iso-${p.id}" placeholder="+ CC">
                                <button class="btn-topup-flex" onclick="topUpPatientStockFlexible(${p.id}, 'Isoflurane')">+</button>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <button class="btn-reset-stock" onclick="resetStockOnly(${p.id})">🔄 RESET STOK GAS (Default 250 CC)</button>
                    </div>

                    <div>
                        <label>Catatan Bebas</label>
                        <textarea id="catatan-${p.id}" rows="3" oninput="updateData(${p.id}, 'catatan', this.value)" placeholder="Text tambahan...">${p.catatan}</textarea>
                    </div>

                    <div class="action-group">
                        <button class="btn-action" onclick="exportToCSV(${p.id})">Export ke CSV</button>
                        <button class="btn-wa" onclick="shareToWhatsApp(${p.id})">Kirim ke WhatsApp</button>
                        <button class="btn-samsung" onclick="exportToSamsungNotes(${p.id})">Export ke Samsung Notes</button>
                    </div>
                </div>
            `;
        });
        renderDisplayOnly();
    }

    // Fungsi memicu kalender HP saat input teks diklik
    function triggerNativeDatePicker(id) {
        const hiddenInput = document.getElementById(`tanggal-hidden-${id}`);
        if(hiddenInput) {
            hiddenInput.showPicker(); // Membuka kalender bawaan perangkat secara paksa
        }
    }

    // Memproses perubahan tanggal dari kalender ke format DD/MM/YYYY secara riil
    function handleNativeDateChange(id, val) {
        if(!val) return;
        const formatted = rawToIndoDate(val);
        const displayInput = document.getElementById(`tanggal-display-${id}`);
        if(displayInput) displayInput.value = formatted;
        
        updateData(id, 'tanggal', formatted);
    }

    function switchPatient(id) {
        currentActiveTab = id;
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => btn.classList.toggle('active', idx === id - 1));
        document.querySelectorAll('.patient-panel').forEach((pnl, idx) => pnl.classList.toggle('active', idx === id - 1));
        renderDisplayOnly();
    }

    function updateData(id, field, value) {
        const p = patients[id - 1];
        if(!p) return;
        if(['o2', 'carrierFlow', 'gasVol'].includes(field)) {
            if(p.isRunning) accumulateGasIncrementally(p);
            p[field] = parseFloat(value) || 0;
        } else {
            p[field] = value;
        }
        if (field === 'gasType') {
            const lbl = document.getElementById(`lblGas-${id}`);
            if(lbl) lbl.innerText = value === 'Sevoflurane' ? 'Sevo' : 'Iso';
        }
        saveDataToStorage();
    }

    function updatePatientStockBaseline(id, type, value) {
        const p = patients[id - 1];
        if(!p) return;
        const val = parseFloat(value) || 0;
        if (type === 'Sevoflurane') {
            p.stockSevo = val;
            p.remainingSevo = val; 
        } else {
            p.stockIso = val;
            p.remainingIso = val;
        }
        saveDataToStorage();
        updateStockDisplayInline(p);
    }

    function topUpPatientStockFlexible(id, type) {
        const p = patients[id - 1];
        if(!p) return;
        const suffix = type === 'Sevoflurane' ? 'sevo' : 'iso';
        const addInpt = document.getElementById(`flex-add-${suffix}-${id}`);
        const baseInpt = document.getElementById(`input-stock-${suffix}-${id}`);
        let amt = parseFloat(addInpt.value) || 0;
        if (amt <= 0) return;

        if (type === 'Sevoflurane') {
            p.stockSevo += amt;
            p.remainingSevo += amt;
            if(baseInpt) baseInpt.value = p.stockSevo.toFixed(0);
        } else {
            p.stockIso += amt;
            p.remainingIso += amt;
            if(baseInpt) baseInpt.value = p.stockIso.toFixed(0);
        }
        addInpt.value = "";
        saveDataToStorage();
        updateStockDisplayInline(p);
    }

    function getFormattedGlobalTime() {
        return new Date().toTimeString().split(' ')[0];
    }

    function startTimer(id) {
        const p = patients[id - 1];
        if (!p || p.isRunning) return;
        p.isRunning = true;
        p.lastTickTime = Date.now();
        if (p.jamMulai === '-') {
            p.jamMulai = getFormattedGlobalTime();
            document.getElementById(`lbl-mulai-${id}`).innerText = p.jamMulai;
        }
        document.getElementById(`btn-start-${id}`).disabled = true;
        document.getElementById(`btn-end-${id}`).disabled = false;
        const b = document.getElementById(`status-${id}`);
        b.innerText = "RUNNING"; b.className = "status-badge running";
        saveDataToStorage();
    }

    function stopTimer(id) {
        const p = patients[id - 1];
        if (!p || !p.isRunning) return;
        accumulateGasIncrementally(p);
        p.isRunning = false;
        p.lastTickTime = null;
        p.jamSelesai = getFormattedGlobalTime();
        document.getElementById(`lbl-selesai-${id}`).innerText = p.jamSelesai;
        document.getElementById(`btn-start-${id}`).disabled = false;
        document.getElementById(`btn-end-${id}`).disabled = true;
        const b = document.getElementById(`status-${id}`);
        b.innerText = "PAUSED"; b.className = "status-badge stopped";
        saveDataToStorage();
    }

    function resetTimer(id) {
        if (!confirm("Reset data pasien kamar ini? (Sisa stok gas terakhir tidak akan berubah)")) return;
        const p = patients[id - 1];
        if(!p) return;
        
        p.nama = '';
        p.catatan = '';
        p.o2 = 0;
        p.carrierFlow = 0;
        p.gasVol = 0;
        p.tanggal = rawToIndoDate(todayRaw);
        
        p.isRunning = false; 
        p.lastTickTime = null; 
        p.totalElapsedMs = 0; 
        p.jamMulai = '-'; 
        p.jamSelesai = '-';
        
        p.accO2_L = 0; 
        p.accN2O_L = 0; 
        p.accAir_L = 0; 
        p.accGas_mL = 0;

        const inputNama = document.getElementById(`nama-${id}`); if(inputNama) inputNama.value = '';
        
        const displayInput = document.getElementById(`tanggal-display-${id}`); if(displayInput) displayInput.value = p.tanggal;
        const hiddenInput = document.getElementById(`tanggal-hidden-${id}`); if(hiddenInput) hiddenInput.value = todayRaw;

        const inputO2 = document.getElementById(`o2-${id}`); if(inputO2) inputO2.value = 0;
        const inputCF = document.getElementById(`carrierFlow-${id}`); if(inputCF) inputCF.value = 0;
        const inputGV = document.getElementById(`gasVol-${id}`); if(inputGV) inputGV.value = 0;
        const inputCatatan = document.getElementById(`catatan-${id}`); if(inputCatatan) inputCatatan.value = '';

        document.getElementById(`btn-start-${id}`).disabled = false;
        document.getElementById(`btn-end-${id}`).disabled = true;
        const b = document.getElementById(`status-${id}`);
        b.innerText = "OFF"; b.className = "status-badge stopped";
        document.getElementById(`timer-display-${id}`).innerText = "00:00:00";
        document.getElementById(`lbl-mulai-${id}`).innerText = "-";
        document.getElementById(`lbl-selesai-${id}`).innerText = "-";
        
        p.stockSevo = p.remainingSevo;
        p.stockIso = p.remainingIso;
        
        const baseSevoInpt = document.getElementById(`input-stock-sevo-${id}`); if(baseSevoInpt) baseSevoInpt.value = p.stockSevo.toFixed(0);
        const baseIsoInpt = document.getElementById(`input-stock-iso-${id}`); if(baseIsoInpt) baseIsoInpt.value = p.stockIso.toFixed(0);

        saveDataToStorage();
        renderDisplayOnly();
        updateStockDisplayInline(p);
    }

    function resetStockOnly(id) {
        if (!confirm("Kembalikan baseline & sisa stok gas kamar ini ke default 250 CC?")) return;
        const p = patients[id - 1];
        if(!p) return;

        p.stockSevo = 250;
        p.stockIso = 250;
        p.remainingSevo = 250;
        p.remainingIso = 250;

        const baseSevoInpt = document.getElementById(`input-stock-sevo-${id}`); if(baseSevoInpt) baseSevoInpt.value = 250;
        const baseIsoInpt = document.getElementById(`input-stock-iso-${id}`); if(baseIsoInpt) baseIsoInpt.value = 250;

        saveDataToStorage();
        updateStockDisplayInline(p);
    }

    function accumulateGasIncrementally(p) {
        if (!p.isRunning || !p.lastTickTime) return;
        const sekarang = Date.now();
        const deltaMs = sekarang - p.lastTickTime;
        if (deltaMs > 0) {
            p.totalElapsedMs += deltaMs;
            const deltaMenit = deltaMs / 60000;
            p.accO2_L += p.o2 * deltaMenit;
            if (p.carrierType === 'N2O') p.accN2O_L += p.carrierFlow * deltaMenit;
            else p.accAir_L += p.carrierFlow * deltaMenit;
            
            const totalFlow = p.o2 + p.carrierFlow;
            const pembagi = (p.gasType === 'Sevoflurane') ? 183 : 194;
            const gasUsed = (p.gasVol * totalFlow * 10 * deltaMenit) / pembagi;
            
            p.accGas_mL += gasUsed;
            
            if (p.gasType === 'Sevoflurane') p.remainingSevo -= gasUsed;
            else p.remainingIso -= gasUsed;
            
            p.lastTickTime = sekarang;
        }
    }

    function updateStockDisplayInline(p) {
        if (p.id === currentActiveTab) {
            const s = document.getElementById(`display-stock-sevo-${p.id}`);
            const i = document.getElementById(`display-stock-iso-${p.id}`);
            if (s && i) { 
                s.innerText = Math.max(0, p.remainingSevo).toFixed(1); 
                i.innerText = Math.max(0, p.remainingIso).toFixed(1); 
            }
        }
    }

    function coreAppLoop() {
        const nowStr = getFormattedGlobalTime();
        let shouldSave = false;
        patients.forEach(p => {
            if (p.isRunning) { accumulateGasIncrementally(p); shouldSave = true; }
            updateStockDisplayInline(p);
        });
        if(shouldSave) saveDataToStorage(); 
        renderDisplayOnly(nowStr);
    }

    function renderDisplayOnly(nowStr = null) {
        const p = patients[currentActiveTab - 1];
        if(!p) return;
        const clk = document.getElementById(`global-clock-${p.id}`);
        if (clk && nowStr) clk.innerText = nowStr;

        const totalDetik = Math.floor(p.totalElapsedMs / 1000);
        const hrs = Math.floor(totalDetik / 3600).toString().padStart(2, '0');
        const mins = Math.floor((totalDetik % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(totalDetik % 60).toString().padStart(2, '0');
        
        const tmr = document.getElementById(`timer-display-${p.id}`);
        if (tmr) tmr.innerText = `${hrs}:${mins}:${secs}`;

        const o2H = document.getElementById(`accO2-${p.id}`);
        const o2L = document.getElementById(`accO2L-${p.id}`);
        const n2o = document.getElementById(`accN2O-${p.id}`);
        const air = document.getElementById(`accAir-${p.id}`);
        const gas = document.getElementById(`accGas-${p.id}`);

        if (o2H) o2H.innerText = (p.totalElapsedMs / 3600000).toFixed(2);
        if (o2L) o2L.innerText = Math.floor(p.accO2_L);
        if (n2o) n2o.innerText = p.accN2O_L.toFixed(1);
        if (air) air.innerText = p.accAir_L.toFixed(1);
        if (gas) gas.innerText = p.accGas_mL.toFixed(2);
    }

    function generateSummaryText(p) {
        const totalDetik = Math.floor(p.totalElapsedMs / 1000);
        const hrs = Math.floor(totalDetik / 3600).toString().padStart(2, '0');
        const mins = Math.floor((totalDetik % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(totalDetik % 60).toString().padStart(2, '0');
        const namaKamar = roomNames[p.id] || `Kamar ${p.id}`;
        
        return `KAMAR: ${namaKamar}\nTANGGAL: ${p.tanggal}\nWAKTU: ${p.jamMulai} s/d ${p.jamSelesai}\nPASIEN: ${p.nama || '-'}\n\n====== GAS UNTUK WA ======\n• O2: ${(p.totalElapsedMs / 3600000).toFixed(2)} Jam (${Math.floor(p.accO2_L)} L)\n• N2O: ${p.accN2O_L.toFixed(1)} L\n• AIR: ${p.accAir_L.toFixed(1)} L\n• ${p.gasType}: ${p.accGas_mL.toFixed(2)} mL cairan\n• Durasi: ${hrs}:${mins}:${secs}\n\n====== SISA STOK ======\n• Sevo: ${p.remainingSevo.toFixed(1)} CC\n• Iso: ${p.remainingIso.toFixed(1)} CC\n\n====== CATATAN ======\n${p.catatan || '-'}`;
    }

    function exportToCSV(id) {
        const p = patients[id - 1];
        if(!p) return;
        const totalDetik = Math.floor(p.totalElapsedMs / 1000);
        const hrs = Math.floor(totalDetik / 3600).toString().padStart(2, '0');
        const mins = Math.floor((totalDetik % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(totalDetik % 60).toString().padStart(2, '0');
        const namaKamar = roomNames[p.id] || `Kamar ${p.id}`;
        
        let csv = "data:text/csv;charset=utf-8,Parameter,Nilai\n";
        csv += `Kamar,${namaKamar}\nTanggal,${p.tanggal}\nMulai,${p.jamMulai}\nSelesai,${p.jamSelesai}\nNama Pasien,${p.nama || '-'}\nDurasi,${hrs}:${mins}:${secs}\nO2 (Jam),${(p.totalElapsedMs / 3600000).toFixed(2)}\nO2 (L),${Math.floor(p.accO2_L)}\nN2O (L),${p.accN2O_L.toFixed(1)}\nAIR (L),${p.accAir_L.toFixed(1)}\nCairan (mL),${p.accGas_mL.toFixed(2)}\nSisa Sevo,${p.remainingSevo.toFixed(1)}\nSisa Iso,${p.remainingIso.toFixed(1)}\n`;
        const encodedUri = encodeURI(csv);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Summary_${namaKamar.replace(' ', '_')}_${p.nama || 'Pasien'}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function shareToWhatsApp(id) {
        if(!patients[id - 1]) return;
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(generateSummaryText(patients[id - 1])), '_blank');
    }

    function exportToSamsungNotes(id) {
        if(!patients[id - 1]) return;
        navigator.clipboard.writeText(generateSummaryText(patients[id - 1])).then(() => {
            alert("Berhasil di Copy! Silakan Tempel di Samsung Notes.");
            window.location.href = "intent://#Intent;scheme=samsungnotes;package=com.samsung.android.app.notes;end";
        });
    }

    initApp();
    setInterval(coreAppLoop, 1000);

    document.addEventListener("resume", function() {
        loadSavedData();
    }, false);
</script>
</body>
</html>
